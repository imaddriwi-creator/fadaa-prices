<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضاء التقنية - دليل الأسعار</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            text-align: right;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #007bff;
        }
        .status {
            color: #e67e22;
            font-weight: bold;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .no-result {
            color: #95a5a6;
            margin-top: 20px;
        }
        .badge {
            background-color: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏪 فضاء التقنية</h1>
        <div class="subtitle">دليل الأسعار</div>
        
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث باسم الصنف أو الكود...">
        
        <div id="statusMessage" class="status">🚧 جاري تحميل البيانات...</div>
        <div id="resultsContainer"></div>
    </div>

    <script>
        // رابط الجوجل شيت الخاص بك بصيغة CSV لسهولة القراءة
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyserO0DyS9TLMj3o_P8OBmXxPb9Y1H1whKiNAHNOh3vUopyWYeOKPYJ82O1NX_9pZ9MlE5c0PnZUW/pub?output=csv';
        
        let products = [];

        // جلب البيانات من الشيت
        async function loadPrices() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                products = parseCSV(data);
                
                // إخفاء رسالة التحميل بمجرد الجاهزية
                document.getElementById('statusMessage').style.display = 'none';
            } catch (error) {
                console.error("خطأ في الاتصال:", error);
                document.getElementById('statusMessage').innerText = "❌ حدث خطأ أثناء تحميل الأسعار. تأكد من اتصال الإنترنت.";
            }
        }

        // تحويل النص القادم من جوجل شيت إلى مصفوفة مرتبة
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length === 0) return [];
            
            // قراءة العناوين من الصف الأول وتجهيزها
            const headers = lines[0].replace(/"/g, '').split(',').map(h => h.trim().toLowerCase());
            
            return lines.slice(1).map(line => {
                if (!line.trim()) return null;
                const columns = line.replace(/"/g, '').split(',');
                let obj = {};
                headers.forEach((header, index) => {
                    obj[header] = columns[index] ? columns[index].trim() : '';
                });
                return obj;
            }).filter(item => item !== null);
        }

        // مراقبة عملية البحث عند الكتابة
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (query === '') {
                resultsContainer.innerHTML = '';
                return;
            }

            // تصفية المنتجات بناءً على الكود (id) أو الاسم (name)
            const filtered = products.filter(product => {
                const nameMatch = product.name && product.name.toLowerCase().includes(query);
                const idMatch = product.id && product.id.toString().includes(query);
                return nameMatch || idMatch;
            });

            displayResults(filtered);
        });

        // عرض جدول النتائج
        function displayResults(results) {
            if (results.length === 0) {
                resultsContainer.innerHTML = '<p class="no-result">عذراً، الصنف غير موجود</p>';
                return;
            }

            let html = `<table>
                            <tr>
                                <th>الكود</th>
                                <th>الصنف</th>
                                <th>السعر</th>
                                <th>الكمية</th>
                            </tr>`;
            
            results.forEach(product => {
                html += `<tr>
                            <td>${product.id || '-'}</td>
                            <td><strong>${product.name || '-'}</strong></td>
                            <td><span class="badge">${product.price || '-'}</span></td>
                            <td>${product.quantity || '-'}</td>
                         </tr>`;
            });
            
            html += '</table>';
            resultsContainer.innerHTML = html;
        }

        // تشغيل النظام فوراً عند فتح الصفحة
        loadPrices();
    </script>
</body>
</html>
